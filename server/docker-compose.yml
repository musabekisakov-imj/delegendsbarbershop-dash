# Local Postgres for dev. Production should use a managed service
# (Supabase, Neon, Railway, AWS RDS) — never run Postgres in Docker
# without persistent volume backups in production.
services:
  postgres:
    image: postgres:16-alpine
    container_name: barberpro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: barberpro
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: barberpro
    ports:
      - "5432:5432"
    volumes:
      - .postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barberpro -d barberpro"]
      interval: 5s
      timeout: 5s
      retries: 10
